approvedGitRepositories:
  - "**"

compressionLevel: mixed

enableGlobalCache: false

enableScripts: true

packageExtensions:
  stylelint-config-sass-guidelines@*:
    dependencies:
      postcss: "*"
  stylelint@*:
    dependencies:
      postcss-scss: "*"

yarnPath: .yarn/releases/yarn-4.14.1.cjs
