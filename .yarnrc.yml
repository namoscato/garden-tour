approvedGitRepositories:
  - "**"

compressionLevel: mixed

enableGlobalCache: false

enableScripts: true

npmMinimalAgeGate: 0

packageExtensions:
  stylelint-config-sass-guidelines@*:
    dependencies:
      postcss: "*"
  stylelint@*:
    dependencies:
      postcss-scss: "*"

yarnPath: .yarn/releases/yarn-4.17.0.cjs
